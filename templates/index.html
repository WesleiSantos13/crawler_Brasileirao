<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Brasileirão</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="top-nav">
        <button onclick="carregarDados('artilharia')">Artilheiros</button>
        <button onclick="carregarDados('participantes')">Participantes</button>
        <button onclick="carregarDados('hattricks')">Hat-tricks</button>
        <button onclick="carregarDados('classificacao')">Classificação</button>
        <button onclick="carregarDados('confrontos')">Confrontos</button>
        <button onclick="carregarDados('assistencias')">Assistências</button>
    </nav>

    <main class="container">
        
        <section class="estatisticas-section">
            <h2>🏆 Recordes Históricos do Brasileirão</h2>
            
            <div class="cards-grid">
                <div class="card">
                    <h3>👑 Maior Pontuador</h3>
                    <p id="card-campeao" class="valor-card">Carregando...</p>
                </div>
                <div class="card">
                    <h3>⚽ Maior Artilheiro</h3>
                    <p id="card-artilheiro" class="valor-card">Carregando...</p>
                </div>
                <div class="card">
                    <h3>👟 Líder de Assistências</h3>
                    <p id="card-assistencia" class="valor-card">Carregando...</p>
                </div>
                <div class="card">
                    <h3>🔥 Rei do Hat-trick</h3>
                    <p id="card-hattrick" class="valor-card">Carregando...</p>
                </div>
            </div>
        </section>

        <section class="tabela-section">
            <h2 id="titulo-pagina">Tabela de Dados</h2>
            <div id="conteudo">
                <p style="text-align: center; color: #666;">Selecione uma opção no menu superior para ver a tabela completa.</p>
            </div>
        </section>

    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
